<title>DG · Signature</title>
<style>
  :root{--gold-4:#c9982f;--gold-2:#f6d779;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{background:#000;display:flex;align-items:center;justify-content:center;
    overflow:hidden;font-family:"Helvetica Neue",Arial,sans-serif;}
  .bg{position:fixed;inset:0;background:radial-gradient(ellipse at 35% 45%,#1a1a1a 0%,#000 60%),#000;}
  .bg::before,.bg::after{content:"";position:absolute;inset:-20%;
    background:repeating-linear-gradient(115deg,rgba(255,255,255,.025) 0px,rgba(255,255,255,.025) 1px,
      transparent 1px,transparent 9px);transform:skewX(-12deg);opacity:.6;}
  .bg::after{transform:skewX(8deg) translateX(10%);opacity:.35;}
  .stage{position:relative;width:min(92vw,900px);}
  canvas{width:100%;height:auto;display:block;filter:drop-shadow(0 0 16px rgba(246,215,121,.22));}
  .replay{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:transparent;border:1px solid var(--gold-4);color:var(--gold-2);
    padding:10px 22px;border-radius:30px;letter-spacing:2px;font-size:12px;cursor:pointer;
    opacity:0;transition:background .25s,color .25s,opacity .5s;}
  .replay.show{opacity:1;}
  .replay:hover{background:var(--gold-4);color:#000;}
</style>

  let out=null;
  function render(T){
    if(!out) out=ctx.createImageData(W,H);
    const o=out.data;
    for(let i=0,j=0;i<order.length;i++,j+=4){
      let f=(T-order[i])/EDGE; f=f<0?0:(f>1?1:f);
      o[j]=goldData[j]; o[j+1]=goldData[j+1]; o[j+2]=goldData[j+2];
      o[j+3]=goldData[j+3]*f;
    }
    ctx.putImageData(out,0,0);
  }
  let raf,t0;
  function frame(ts){
    if(!t0) t0=ts;
    let p=(ts-t0-START_DELAY)/WRITE_DUR; if(p<0)p=0; if(p>1)p=1;
    render(p*(1+EDGE));
    if(p<1) raf=requestAnimationFrame(frame); else replay.classList.add('show');
  }
  function run(){ if(!ready) return; cancelAnimationFrame(raf); t0=null;
    replay.classList.remove('show'); raf=requestAnimationFrame(frame); }
  replay.addEventListener('click',run);
