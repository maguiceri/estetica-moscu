  function ready(){ if(loaded===2){ if(document.fonts&&document.fonts.ready) document.fonts.ready.then(run); else run(); } }

  let out=null;
  function renderWoman(T){ if(!out)out=ctx.createImageData(cw,ch); const o=out.data,A=artData;
    for(let i=0,j=0;i<order.length;i++,j+=4){ let f=(T-order[i])/EDGE; f=f<0?0:(f>1?1:f);
      o[j]=A[j];o[j+1]=A[j+1];o[j+2]=A[j+2];o[j+3]=A[j+3]*f; } ctx.putImageData(out,0,0); }

  let anims=[],raf,t0;
  function prep(p){const L=p.getTotalLength();p.style.strokeDasharray=L;p.style.strokeDashoffset=L;return L;}
  function run(){
    anims.forEach(x=>x.cancel()); anims=[]; cancelAnimationFrame(raf); t0=null;
    replay.classList.remove('show'); tM.style.opacity=0; tE.style.opacity=0;
    prep(ring);   // ocultar el aro desde el inicio (primero carga solo la chica)
    // FASE 1: la mujer
    function frame(ts){ if(!t0)t0=ts; let p=(ts-t0-START_DELAY)/WOMAN_DUR; if(p<0)p=0; if(p>1)p=1;
      renderWoman(p*(1+EDGE)); if(p<1) raf=requestAnimationFrame(frame); else phase2(); }
    raf=requestAnimationFrame(frame);
  }
  function phase2(){
    // FASE 2: el aro se dibuja, y las palabras aparecen MIENTRAS se dibuja
    const L=prep(ring);
    const aR=ring.animate([{strokeDashoffset:L},{strokeDashoffset:0}],{duration:RING_DUR,delay:GAP,easing:'ease-in-out',fill:'forwards'});
    const a1=tM.animate([{opacity:0},{opacity:1}],{duration:TEXT_FADE,delay:GAP+250,fill:'forwards'});
    const a2=tE.animate([{opacity:0},{opacity:1}],{duration:TEXT_FADE,delay:GAP+550,fill:'forwards'});
    anims.push(aR,a1,a2);
    aR.onfinish=()=>replay.classList.add('show');
  }
  replay.addEventListener('click',run);
  </script>
